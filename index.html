<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cipher Pipeline Encoder</title>
<img src="Assets/icon.png" alt="Icon" width="24" height="24">

<style>
body{
    background:#111;
    color:#eee;
    font-family:Arial;
    padding:20px;
}

textarea{
    width:100%;
    height:150px;
    background:#222;
    color:#00ff88;
    border:1px solid #555;
    padding:10px;
    margin-bottom:10px;
    resize:vertical;
}

button{
    padding:10px 20px;
    margin-right:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Cipher Pipeline Encoder (Made by K59 Kale)</h2>

<textarea id="input" placeholder="Enter text..."></textarea>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>

<h3>Output</h3>

<textarea id="output"></textarea>

<script>

// Original Base64 alphabet
const normal =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";

// Custom alphabet (64 unique characters)
const custom =
"Q8AqVN9xKeD3L2sPmRu7TcWy1FgHjUkXbYo0lGiIhBnOpC4dES6vJZf5rMtaz+/";

//--------------------------------------------------

function reverse(str){
    return str.split("").reverse().join("");
}

//--------------------------------------------------

function atbash(str){

    let out="";

    for(let c of str){

        if(c>='A'&&c<='Z'){
            out+=String.fromCharCode(90-(c.charCodeAt(0)-65));
        }

        else if(c>='a'&&c<='z'){
            out+=String.fromCharCode(122-(c.charCodeAt(0)-97));
        }

        else{
            out+=c;
        }

    }

    return out;
}

//--------------------------------------------------

function caesar(str,shift){

    let out="";

    for(let c of str){

        if(c>='A'&&c<='Z'){

            let x=(c.charCodeAt(0)-65+shift+26)%26;
            out+=String.fromCharCode(x+65);

        }

        else if(c>='a'&&c<='z'){

            let x=(c.charCodeAt(0)-97+shift+26)%26;
            out+=String.fromCharCode(x+97);

        }

        else{

            out+=c;

        }

    }

    return out;

}

//--------------------------------------------------

function swapPairs(str){

    let arr=str.split("");

    for(let i=0;i<arr.length-1;i+=2){

        let t=arr[i];
        arr[i]=arr[i+1];
        arr[i+1]=t;

    }

    return arr.join("");

}

//--------------------------------------------------

function replaceAlphabet(str,from,to){

    let out="";

    for(let c of str){

        let i=from.indexOf(c);

        if(i==-1)
            out+=c;
        else
            out+=to[i];

    }

    return out;

}

//--------------------------------------------------

function encode(){

    let text=document.getElementById("input").value;

    text=reverse(text);

    text=atbash(text);

    text=caesar(text,7);

    text=swapPairs(text);

    text=btoa(unescape(encodeURIComponent(text)));

    text=replaceAlphabet(text,normal,custom);

    text=reverse(text);

    document.getElementById("output").value=text;

}

//--------------------------------------------------

function decode(){

    try{

        let text=document.getElementById("input").value;

        text=reverse(text);

        text=replaceAlphabet(text,custom,normal);

        text=decodeURIComponent(escape(atob(text)));

        text=swapPairs(text);

        text=caesar(text,-7);

        text=atbash(text);

        text=reverse(text);

        document.getElementById("output").value=text;

    }

    catch(e){

        document.getElementById("output").value="Invalid encoded text.";

    }

}

</script>

</body>
</html>
